# Git Workflow Manager Configuration
# ===================================

scan:
  root_directories:
    - "/mnt/c/DEV"
    - "/mnt/c/DEV/PROJECTS"
    - "/home/mmo/repos"
    - "/mnt/c/DEV/JEDHA/FULLSTACK_WSL"
    - "/mnt/c/DEV/JEDHA/lead"
  max_depth: 3
  scan_nested_repos: true    # ← AJOUTER : scanner les repos imbriqués

  exclude_patterns:
    - "node_modules"
    - "__pycache__"
    - ".venv"
    - "vendor"
    - ".git"
    - "hf_space"          # ← Ajouter
    - "huggingface"       # ← Ajouter

tracking:
  auto_add_new_repos: false
  known_repos_file: "data/known_repos.json"

llm:
  provider: "ollama"  # claude | ollama au choix, Ollama utilisation sans comsommation de token, mais nécessite une instance locale
  claude:
    model: "claude-sonnet-4-20250514"
    max_tokens: 2048
  ollama:
    model: "mistral:7b"
    base_url: "http://localhost:11434"

git:
  default_branch: "main"
  commit_style: "conventional"  # conventional | simple
  auto_push: false

readme:
  auto_generate: true
  update_existing: false        # true = met à jour, false = seulement si absent

logging:
  level: "INFO"
  file: "data/logs/workflow.log"

schedule:
  enabled: true
  time: "18:00"  # Format HH:MM (24h)